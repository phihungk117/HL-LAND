version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ts_postgres
    environment:
      POSTGRES_DB: truongson_db
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ts_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ts_redis_pass

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ts_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ts_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  minio:
    image: minio/minio:latest
    container_name: ts_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ts_minio
      MINIO_ROOT_PASSWORD: ts_minio_pass
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: ts_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # app:
  #   build: .
  #   container_name: ts_app
  #   depends_on:
  #     - postgres
  #     - redis
  #     - kafka
  #     - minio
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_PROFILES_ACTIVE: docker
  #   env_file:
  #     - .env

volumes:
  postgres_data:
  minio_data: