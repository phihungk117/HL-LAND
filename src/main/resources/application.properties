spring.application.name=truongson-realestate

# 🐘 Datasource & Hikari Pool
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:truongson_db}
spring.datasource.username=${DB_USER:ts_user}
spring.datasource.password=${DB_PASS:ts_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# 📦 JPA & Hibernate
# Chú ý: ddl-auto chuyển thành validate vì ta sẽ dùng Flyway để tạo bảng
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# 🗄️ Flyway (Quản lý version Database)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ⚡ Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:ts_redis_pass}
spring.data.redis.timeout=2000ms

# 📨 Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=truongson-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.truongson.*

# 🔐 App Custom Properties (JWT & MinIO)
# Cấp mặc định cho JWT_SECRET để tránh lỗi không khởi động được ứng dụng khi chạy local
app.jwt.secret=${JWT_SECRET:truong-son-super-secret-key-2024-must-be-256bit-long!!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:ts_minio}
app.minio.secret-key=${MINIO_SECRET_KEY:ts_minio_pass}
app.minio.bucket=${MINIO_BUCKET:truongson-files}

# 📈 Management / Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true

# 📚 Springdoc / Swagger API
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.info.title=Trường Sơn Real Estate API
springdoc.info.version=1.0.0